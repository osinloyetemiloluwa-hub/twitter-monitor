services:
  - type: web
    name: discord-x-bot
    runtime: python
    plan: free  # Free tier available; upgrade for better uptime
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DISCORD_BOT_TOKEN
        sync: false  # Set this in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: xbot-db
          property: connectionString
    autoDeploy: true

databases:
  - name: xbot-db
    plan: free  # Free PostgreSQL (128MB, 10GB storage)
    ipAllowList: []  # Required for Render PostgreSQL
